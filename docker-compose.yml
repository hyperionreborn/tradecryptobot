version: '3.8'
services:
  redis:
    image: redis:6
    ports: ["6379:6379"]
  feeder:
    build: .
    command: python feeder.py
    depends_on: [redis]
  engine:
    build: .
    command: python engine.py
    ports: 
      - "8000:8000"
    depends_on: [redis]
  exec_sim:
    build: .
    command: python exec_sim.py
    depends_on: [redis]
  prometheus:
    image: prom/prometheus
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml"]
    ports: ["9090:9090"]
  grafana:
    image: grafana/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus]
